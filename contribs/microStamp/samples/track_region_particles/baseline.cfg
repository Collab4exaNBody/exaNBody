configuration:
  physics:
    units:
      length: angstrom
      mass: Dalton
      time: picosecond
      charge: elementary_charge
      temperature: kelvin
      amount: particle
      luminosity: candela
      angle: radian
      energy: joule
    
global:
  dt: 2e-3 ps
  rcut_inc: 2.0 ang
  rcut_max: 4.1 ang
  simulation_log_frequency: 10
  simulation_dump_thermo_frequency: 10
  simulation_dump_frequency: -1
  simulation_end_iteration: 100

simulation: default_simulation

lennard_jones_force:
  config: { epsilon: 0.3729 eV , sigma: 2.2808 ang }
  rcut: 4.1 ang

compute_all_forces_energy:    
  - zero_particle_force: { ghost: true }
  - lennard_jones_force
  - set_velocity: { value: [ 0, 0, -100. m/s], region: BAS }
  - set_velocity: { value: [ 0, 0,  100. m/s], region: HAUT }
  - set_force: { value: [ 0, 0, 0], region: BAS }
  - set_force: { value: [ 0, 0, 0], region: HAUT }
  - update_force_from_ghost
  - divide_force_by_type_scalar: mass

final_dump: nop